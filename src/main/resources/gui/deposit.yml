# RoyalBank - deposit menu. See main.yml for the effect + placeholder reference.
title: "&a&lDeposit"
rows: 4

sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2
  success:
    enabled: true
    name: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.8
    pitch: 1.4
  fail:
    enabled: true
    name: ENTITY_VILLAGER_NO
    volume: 0.7
    pitch: 1.0
  prompt:
    enabled: true
    name: BLOCK_NOTE_BLOCK_PLING
    volume: 0.7
    pitch: 1.5

pages:
  - page: 1
    mask:
      items:
        - gray_stained_glass_pane
      pattern:
        - "111111111"
        - "111111111"
        - "111111111"
        - "111111111"

slots:
  - item: hopper name:"&a&lDeposit All"
    lore:
      - "&7Deposit your entire purse."
      - ""
      - "&7Purse: &6%purse%"
      - ""
      - "&eClick to deposit all!"
    location:
      row: 2
      column: 3
    left-click:
      - id: deposit
        args:
          amount: all

  - item: chest_minecart name:"&a&lDeposit Half"
    lore:
      - "&7Deposit half of your purse."
      - ""
      - "&7Half: &6%half_purse%"
      - ""
      - "&eClick to deposit half!"
    location:
      row: 2
      column: 5
    left-click:
      - id: deposit
        args:
          amount: half

  - item: name_tag name:"&a&lDeposit Custom"
    lore:
      - "&7Type an exact amount in chat."
      - "&7Shorthand works too (5k, 5m, 5b)."
      - ""
      - "&eClick, then type an amount!"
    location:
      row: 2
      column: 7
    left-click:
      - id: deposit
        args:
          amount: custom

  - item: book name:"&e&lYour Coins"
    lore:
      - "&7Purse: &6%purse%"
      - "&7Bank: &6%balance%&7/&6%max_balance%"
      - "&7Room to deposit: &6%bank_space%"
    location:
      row: 3
      column: 5

  - item: arrow name:"&e&lBack"
    lore:
      - "&7Return to the main bank menu."
    location:
      row: 4
      column: 4
    left-click:
      - id: open_menu
        args:
          menu: main

  - item: barrier name:"&c&lClose"
    lore:
      - "&7Close this menu."
    location:
      row: 4
      column: 6
    left-click:
      - id: close_inventory
