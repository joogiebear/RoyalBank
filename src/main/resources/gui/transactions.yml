# RoyalBank - transaction history. The mask '0' slots are filled with your recent transactions
# (newest first); '1' slots are filler. See main.yml for the effect reference.
title: "&d&lTransactions"
rows: 6

sounds:
  open:
    enabled: true
    name: UI_BUTTON_CLICK
    volume: 0.7
    pitch: 1.2
  success:
    enabled: true
    name: ENTITY_EXPERIENCE_ORB_PICKUP
    volume: 0.8
    pitch: 1.4
  fail:
    enabled: true
    name: ENTITY_VILLAGER_NO
    volume: 0.7
    pitch: 1.0
  prompt:
    enabled: true
    name: BLOCK_NOTE_BLOCK_PLING
    volume: 0.7
    pitch: 1.5

pages:
  - page: 1
    mask:
      items:
        - gray_stained_glass_pane
      pattern:
        - "111111111"
        - "100000001"
        - "100000001"
        - "100000001"
        - "100000001"
        - "111111111"

slots:
  - item: arrow name:"&e&lBack"
    lore:
      - "&7Return to the main bank menu."
    location:
      row: 6
      column: 4
    left-click:
      - id: open_menu
        args:
          menu: main

  - item: barrier name:"&c&lClose"
    lore:
      - "&7Close this menu."
    location:
      row: 6
      column: 6
    left-click:
      - id: close_inventory
