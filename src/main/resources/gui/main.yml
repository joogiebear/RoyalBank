title: "&6&lBank"
rows: 4
sounds:
  open:
    enabled: true
    name: "UI_BUTTON_CLICK"
    volume: 0.7
    pitch: 1.2
  success:
    enabled: true
    name: "ENTITY_EXPERIENCE_ORB_PICKUP"
    volume: 0.8
    pitch: 1.4
  fail:
    enabled: true
    name: "ENTITY_VILLAGER_NO"
    volume: 0.7
    pitch: 1.0
  prompt:
    enabled: true
    name: "BLOCK_NOTE_BLOCK_PLING"
    volume: 0.7
    pitch: 1.5
filler:
  enabled: true
  material: "GRAY_STAINED_GLASS_PANE"
  name: "&8"
  lore: []
items:
  deposit:
    slot: 12 # row 2, column 3
    material: "CHEST"
    name: "&aDeposit Coins"
    lore:
      - "&7Deposit coins from your purse"
      - "&7into your protected bank account."
      - ""
      - "&7Purse: &6{purse}"
      - "&7Bank: &6{balance}&7/&6{max_balance}"
      - ""
      - "&eClick to deposit coins!"
    action: "OPEN_DEPOSIT"
  withdraw:
    slot: 14 # row 2, column 5
    material: "DISPENSER"
    name: "&aWithdraw Coins"
    lore:
      - "&7Withdraw coins from your bank"
      - "&7back into your purse."
      - ""
      - "&7Bank: &6{balance}"
      - ""
      - "&eClick to withdraw coins!"
    action: "OPEN_WITHDRAW"
  transactions:
    slot: 16 # row 2, column 7
    material: "MAP"
    name: "&aRecent Transactions"
    lore:
      - "&7View your last 10 bank"
      - "&7transactions."
      - ""
      - "&eClick to view history!"
    action: "RECENT_TRANSACTIONS"
  close:
    slot: 32 # row 4, column 5
    material: "BARRIER"
    name: "&cClose"
    lore:
      - "&7Close this menu."
    action: "CLOSE"
  info:
    slot: 33 # row 4, column 6
    material: "BOOK"
    name: "&eBank Information"
    lore:
      - "&7Account: &f{account_name}"
      - "&7Current Balance: &6{balance}"
      - "&7Balance Limit: &6{max_balance}"
      - "&7Purse: &6{purse}"
      - ""
      - "&7Next Interest: &6{next_interest}"
      - "&7Interest Payment: &b{interest_time}"
      - "&7Interest Cap: &6{max_interest}"
    action: "NONE"
  upgrades:
    slot: 36 # row 4, column 9
    material: "GOLD_BLOCK"
    locked-material: "BARRIER"
    name: "&6Bank Upgrades"
    locked-name: "&cBank Upgrades Locked"
    lore:
      - "{upgrade_info}"
      - ""
      - "&eClick to upgrade!"
    action: "UPGRADE"
