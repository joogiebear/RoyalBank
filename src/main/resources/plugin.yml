name: RoyalBank
version: ${version}
main: com.mystipixel.royalbank.RoyalBankPlugin
api-version: '1.21'
author: Mystipixel
# JDBC drivers + connection pool are downloaded at runtime by Paper's library loader.
libraries:
  - org.xerial:sqlite-jdbc:3.46.1.3
  - com.zaxxer:HikariCP:5.1.0
  - com.mysql:mysql-connector-j:8.4.0
depend:
  - Vault
softdepend:
  - eco
  - EcoItems
  - PlaceholderAPI
  - EconGuard
commands:
  bank:
    description: RoyalBank player banking command.
    usage: /bank [balance|deposit|withdraw|transfer|upgrade|interest|reload|admin]
    aliases: [royalbank, rb]
permissions:
  royalbank.use:
    default: true
  royalbank.deposit:
    default: true
  royalbank.withdraw:
    default: true
  royalbank.transfer:
    description: Transfer bank money to another player.
    default: true
  royalbank.upgrade:
    default: true
  royalbank.admin:
    default: op
  royalbank.alerts:
    description: Receives anti-abuse alerts and flag notifications in chat.
    default: op
